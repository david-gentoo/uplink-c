
name: Create golang vendor dist
on:
  push:
    tags:
      - '**'

jobs:
  golang-dist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create golang dist
        uses: projg2/golang-dist-action@v1
        with:
          dist-filename: uplink-c-1.6.2
          vendor-dir: uplink-c-1.6.2

